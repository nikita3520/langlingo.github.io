<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Вход в аккаунт Langlingo" />
    <title>Langlingo — вход</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img class="logo-img" src="./langlingo-logo.svg" alt="Langlingo" />
      </div>
    </header>

    <main class="auth-page">
      <h1 class="onboarding-title">Вход в аккаунт</h1>
      <form class="auth-card" id="login-form" action="#" method="post">
        <label class="auth-field">
          Email
          <input type="email" name="email" required />
        </label>

        <label class="auth-field">
          Пароль
          <input type="password" name="password" required />
        </label>

        <button class="primary-action" type="submit">Войти</button>
        <a class="secondary-action auth-link" href="./register.html">Нет аккаунта? Зарегистрироваться</a>
      </form>
    </main>

    <script>
      const loginForm = document.getElementById("login-form");

      loginForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const isRegistered = localStorage.getItem("langlingo_registered") === "1";
        const formData = new FormData(loginForm);
        const savedEmail = localStorage.getItem("langlingo_user_email");
        const savedPassword = localStorage.getItem("langlingo_user_password");

        if (!isRegistered) {
          window.location.href = "./register.html";
          return;
        }

        if (
          savedEmail &&
          savedPassword &&
          (formData.get("email") !== savedEmail ||
            formData.get("password") !== savedPassword)
        ) {
          alert("Неверная почта или пароль");
          return;
        }

        localStorage.setItem("langlingo_logged_in", "1");
        window.location.href = "./app.html";
      });
    </script>
  </body>
</html>
