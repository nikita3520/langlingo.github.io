<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Базовый шаблон страницы" />
    <title>Langlingo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img class="logo-img" src="./langlingo-logo.svg" alt="Langlingo" />
      </div>
      <div class="header">
        <a href="./login.html">войти</a>
        <a href="./register.html">регистрация</a>
      </div>
    </header>
    <div class="chat">
      <div class="message user">
        что это за<br />приложение?
        <span class="circle user"></span>
      </div>
      <div class="message bot">
        <span class="circle bot"></span>
        Langlingo — это приложение для изучения иностранных языков.<br />
        Проект создан как учебный прототип приложения Duolingo.
      </div>
      <div class="message user">
        окей, я хочу изучать<br />английский язык.
        <span class="circle user"></span>
      </div>
      <div class="message bot">
        <span class="circle bot"></span>
        отлично, чтобы начать изучать язык<br />
        нужно зарегистрироваться или войти в систему.
      </div>
    </div>
    <div class="start-learning-wrap">
      <a class="start-learning" href="./onboarding.html">начать обучение</a>
    </div>
  </body>
</html>
