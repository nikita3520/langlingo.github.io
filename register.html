<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Регистрация в Langlingo" />
    <title>Langlingo — регистрация</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img class="logo-img" src="./langlingo-logo.svg" alt="Langlingo" />
      </div>
    </header>

    <main class="auth-page">
      <h1 class="onboarding-title">Создайте аккаунт</h1>
      <form class="auth-card" id="register-form" action="#" method="post">
        <label class="auth-field">
          Имя
          <input type="text" name="name" required />
        </label>

        <label class="auth-field">
          Email
          <input type="email" name="email" required />
        </label>

        <label class="auth-field">
          Пароль
          <input type="password" name="password" minlength="6" required />
        </label>

        <button class="primary-action" type="submit">Зарегистрироваться</button>
        <a class="secondary-action auth-link" href="./login.html">Уже есть аккаунт? Войти</a>
      </form>
    </main>

    <script>
      const registerForm = document.getElementById("register-form");

      registerForm.addEventListener("submit", function (event) {
        event.preventDefault();
        const formData = new FormData(registerForm);
        const registrationDate = new Date().toLocaleDateString("ru-RU");

        localStorage.setItem("langlingo_user_name", formData.get("name"));
        localStorage.setItem("langlingo_user_email", formData.get("email"));
        localStorage.setItem("langlingo_user_password", formData.get("password"));
        localStorage.setItem("langlingo_registration_date", registrationDate);
        localStorage.setItem("langlingo_registered", "1");
        localStorage.setItem("langlingo_logged_in", "1");
        window.location.href = "./app.html";
      });
    </script>
  </body>
</html>
